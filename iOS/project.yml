name: TomatoClockIOS
options:
  bundleIdPrefix: com.rfbz
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
targets:
  TomatoClockCore:
    type: framework
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ../Sources/TomatoClockCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rfbz.TomatoClockCore
        PRODUCT_NAME: TomatoClockCore
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  TomatoClockIOSKit:
    type: framework
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ../Sources/TomatoClockIOSKit
    dependencies:
      - target: TomatoClockCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rfbz.TomatoClockIOSKit
        PRODUCT_NAME: TomatoClockIOSKit
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES

  TomatoClockIOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ../Sources/TomatoClockIOS
    dependencies:
      - target: TomatoClockIOSKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rfbz.TomatoClockIOS
        PRODUCT_NAME: TomatoClockIOS
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: TomatoClock
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiredDeviceCapabilities: arm64
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_STYLE: Automatic
